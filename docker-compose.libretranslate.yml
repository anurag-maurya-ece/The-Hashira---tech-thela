version: "3.9"

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: tech-thela-libretranslate
    ports:
      - "5000:5000"
    environment:
      LT_DISABLE_FILES_TRANSLATION: "true"
      LT_DISABLE_WEB_UI: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/languages').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
